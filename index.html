<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Medportal | Disparos RD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --primary:#1E2D5C;
      --secondary:#253F85;
      --accent:#00A6DF;
      --support:#F9BD00;
      --bg:#ECF0F8;
      --card:#ffffff;
      --text:#383839;
      --muted:#7B7D81;
    }

    [data-theme="dark"]{
      --bg:#0E1429;
      --card:#151C3A;
      --text:#E6E8F0;
      --muted:#A0A4C0;
    }

    *{box-sizing:border-box;font-family:'Roboto',sans-serif;}
    body{margin:0;background:var(--bg);color:var(--text);transition:.3s;}

    .sidebar{
      position:fixed;left:0;top:0;bottom:0;width:260px;
      background:var(--primary);color:#fff;
      padding:24px;display:flex;flex-direction:column;
    }

    .logo{
      display:flex;justify-content:center;align-items:center;
      margin-bottom:32px;
    }
    .logo img{max-width:180px;display:none;}
    .logo img.active{display:block;}

    .nav a{
      display:block;color:#fff;text-decoration:none;
      padding:12px 14px;border-radius:8px;
      margin-bottom:6px;transition:.3s;
    }
    .nav a:hover,.nav a.active{
      background:rgba(255,255,255,.15);
    }

    .theme-toggle{
      margin-top:auto;
      background:rgba(255,255,255,.15);
      border:none;border-radius:8px;
      padding:10px;color:#fff;
      cursor:pointer;
    }

    .main{margin-left:260px;padding:32px;}
    .section{display:none;}
    .section.active{display:block;}

    .kpis{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;margin-bottom:24px;
    }
    .card{
      background:var(--card);
      border-radius:12px;padding:20px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
    }
    .card span{font-size:13px;color:var(--muted);}
    .card h2{margin:8px 0;color:var(--secondary);}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
      gap:24px;
    }
    .chart-card{
      background:var(--card);
      border-radius:12px;padding:20px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
    }
  </style>
</head>

<body data-theme="light">

  <div class="sidebar">
    <div class="logo">
      <img id="logoLight" src="logo-play-azulclaro(3).png" class="active" />
      <img id="logoDark" src="logo-play-padrao(3).png" />
    </div>

    <div class="nav">
      <a href="#" class="active" onclick="showSection(event,'geral')">📊 Visão Geral</a>
      <a href="#" onclick="showSection(event,'horarios')">⏰ Horários & Dias</a>
      <a href="#" onclick="showSection(event,'ranking')">🏆 Ranking</a>
      <a href="#" onclick="showSection(event,'insights')">💡 Insights</a>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">🌙 / ☀️ Tema</button>
  </div>

  <div class="main">

    <section id="geral" class="section active">
      <div class="kpis">
        <div class="card"><span>Taxa Média de Abertura</span><h2>29,49%</h2></div>
        <div class="card"><span>CTR Médio</span><h2>3,92%</h2></div>
        <div class="card"><span>Taxa de Entrega</span><h2>97,04%</h2></div>
      </div>

      <div class="grid">
        <div class="chart-card"><canvas id="evolucao"></canvas></div>
        <div class="chart-card"><canvas id="funil"></canvas></div>
      </div>
    </section>

    <section id="horarios" class="section">
      <div class="grid">
        <div class="chart-card"><canvas id="aberturaDia"></canvas></div>
        <div class="chart-card"><canvas id="ctrHora"></canvas></div>
      </div>
    </section>

    <section id="ranking" class="section">
      <div class="chart-card"><canvas id="rankingChart"></canvas></div>
    </section>

    <section id="insights" class="section">
      <div class="chart-card">
        <ul>
          <li><b>Melhor dia:</b> Quinta-feira</li>
          <li><b>Melhor horário:</b> 12h – 15h</li>
          <li>Webinars concentram maior CTR</li>
        </ul>
      </div>
    </section>

  </div>

  <script>
    function showSection(e,id){
      e.preventDefault();
      document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
      e.target.classList.add('active');
    }

    function toggleTheme(){
      const body=document.body;
      const light=document.getElementById('logoLight');
      const dark=document.getElementById('logoDark');

      if(body.dataset.theme==='light'){
        body.dataset.theme='dark';
        light.classList.remove('active');
        dark.classList.add('active');
      }else{
        body.dataset.theme='light';
        dark.classList.remove('active');
        light.classList.add('active');
      }
    }

    new Chart(document.getElementById('evolucao'),{
      type:'line',
      data:{
        labels:['Dez','Jan','Fev','Mar','Abr'],
        datasets:[{
          data:[24,28,32,27,29],
          borderColor:'#00A6DF',
          tension:.4
        }]
      }
    });

    new Chart(document.getElementById('funil'),{
      type:'bar',
      data:{
        labels:['Enviados','Entregues','Abertos','Cliques'],
        datasets:[{
          data:[25000,24200,7100,980],
          backgroundColor:['#253F85','#1E2D5C','#00A6DF','#F9BD00']
        }]
      }
    });

    new Chart(document.getElementById('aberturaDia'),{
      type:'bar',
      data:{
        labels:['Seg','Ter','Qua','Qui','Sex'],
        datasets:[{
          data:[26.5,27.6,30.5,34.5,28.4],
          backgroundColor:'#253F85'
        }]
      }
    });

    new Chart(document.getElementById('ctrHora'),{
      type:'line',
      data:{
        labels:['8','10','12','14','16'],
        datasets:[{
          data:[0,1,8.5,1.2,6.1],
          borderColor:'#F9BD00',
          tension:.4
        }]
      }
    });

    new Chart(document.getElementById('rankingChart'),{
      type:'bar',
      data:{
        labels:['Webinar','Pesquisa','Institucional'],
        datasets:[{
          data:[54,38,24],
          backgroundColor:'#00A6DF'
        }]
      }
    });
  </script>

</body>
</html>
