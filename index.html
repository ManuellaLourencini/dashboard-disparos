<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Medportal | Disparos RD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonte -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#1E2D5C;
  --secondary:#253F85;
  --accent:#00A6DF;
  --highlight:#F9BD00;
  --bg:#ECF0F8;
  --card:#ffffff;
  --text:#383839;
  --muted:#7B7D81;
}

*{box-sizing:border-box;font-family:'Roboto',sans-serif;}
body{margin:0;background:var(--bg);color:var(--text);}

.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:260px;
  background:var(--primary);color:#fff;
  padding:24px;display:flex;flex-direction:column;
}
.logo{text-align:center;margin-bottom:32px;}
.logo img{max-width:180px;}

.nav a{
  display:block;color:#fff;text-decoration:none;
  padding:12px 14px;border-radius:8px;
  margin-bottom:6px;
}
.nav a.active,.nav a:hover{background:rgba(255,255,255,.15);}

.theme-toggle{
  margin-top:auto;
  border:none;border-radius:8px;
  background:rgba(255,255,255,.15);
  color:#fff;padding:10px;
  cursor:pointer;font-size:18px;
}

.main{margin-left:260px;padding:32px;}
.section{display:none;}
.section.active{display:block;}

h1{
  font-size:22px;
  margin:0 0 16px 0;
  display:flex;
  align-items:center;
  gap:8px;
}

.help{
  background:var(--accent);
  color:#fff;
  width:18px;height:18px;
  border-radius:50%;
  font-size:12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-bottom:28px;
}
.card{
  background:var(--card);
  border-radius:12px;
  padding:18px 20px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}
.card span{
  font-size:12px;
  color:var(--muted);
}
.card h2{
  margin:6px 0 0 0;
  font-size:24px;
  color:var(--secondary);
  font-weight:600;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
  gap:24px;
}

.chart-card{
  background:var(--card);
  border-radius:12px;
  padding:20px 22px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.chart-card h3{
  margin:0 0 12px 0;
  font-size:14px;
  color:var(--secondary);
  font-weight:500;
}

.executive{
  margin-top:24px;
  padding:20px 24px;
  background:var(--card);
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}
.executive p{
  margin:6px 0;
  line-height:1.5;
}
.executive b{color:var(--secondary);}

.filters{
  display:flex;
  gap:12px;
  margin-bottom:12px;
}
.filters select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.table-wrap{
  margin-top:16px;
  overflow:auto;
  max-height:420px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
thead th{
  position:sticky;
  top:0;
  background:#f4f6fb;
  text-align:left;
  padding:10px;
  font-weight:500;
}
tbody td{
  padding:10px;
  border-bottom:1px solid #eee;
}
tbody tr:nth-child(even){background:#fafbff;}
td.num{text-align:center;}
.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
  background:rgba(0,166,223,.12);
  color:#005f80;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">
    <img src="logo-play-azulclaro(3).png" alt="Medportal">
  </div>
  <div class="nav">
    <a href="#" class="active" onclick="showSection(event,'visao')">Visão Geral</a>
    <a href="#" onclick="showSection(event,'horarios')">Horários e Dias</a>
    <a href="#" onclick="showSection(event,'ranking')">Ranking</a>
    <a href="#" onclick="showSection(event,'insights')">Insights</a>
  </div>
  <button class="theme-toggle">🌙 ☀️</button>
</div>

<div class="main">

<section id="visao" class="section active">
  <h1>Dashboard – Visão Geral <span class="help" title="Resumo executivo de performance dos disparos">?</span></h1>

  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="chart-card">
      <h3>Evolução mensal</h3>
      <canvas id="evolucao"></canvas>
    </div>
    <div class="chart-card">
      <h3>Médias gerais</h3>
      <canvas id="comparacao"></canvas>
    </div>
    <div class="chart-card">
      <h3>Distribuição de CTR</h3>
      <canvas id="distribuicao"></canvas>
    </div>
  </div>

  <div class="executive" id="leituraExecutiva"></div>

  <div class="chart-card" style="margin-top:24px">
    <h3>Detalhamento dos disparos</h3>

    <div class="filters">
      <select id="filtroCampanha" multiple></select>
    </div>

    <div class="table-wrap">
      <table id="tabela"></table>
    </div>
  </div>
</section>

</div>

<script>
/* ================= DADOS ================= */
const dados = [
  {assunto:'Webinar Exclusivo',data:'26/02/2026',dia:'Quinta',hora:'12:55',tipo:'Webinar',leads:121,entregues:120,aberturas:59,cliques:39,taxaEntrega:99.17,taxaAbertura:49.17,ctr:32.5},
  {assunto:'Atualização Institucional',data:'12/01/2026',dia:'Segunda',hora:'10:00',tipo:'Institucional',leads:684,entregues:659,aberturas:160,cliques:0,taxaEntrega:96.35,taxaAbertura:24.28,ctr:0},
  {assunto:'Webinar – É amanhã',data:'25/02/2026',dia:'Quarta',hora:'15:58',tipo:'Webinar',leads:116,entregues:113,aberturas:61,cliques:15,taxaEntrega:97.41,taxaAbertura:53.98,ctr:13.27}
];

const media = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
const soma = arr => arr.reduce((a,b)=>a+b,0);

/* ================= KPIs ================= */
const kpis = [
  ['E-mails disparados',dados.length],
  ['Leads selecionados',soma(dados.map(d=>d.leads))],
  ['Entregues',soma(dados.map(d=>d.entregues))],
  ['Taxa média de entrega',media(dados.map(d=>d.taxaEntrega)).toFixed(1)+'%'],
  ['Taxa média de abertura',media(dados.map(d=>d.taxaAbertura)).toFixed(1)+'%'],
  ['CTR médio',media(dados.map(d=>d.ctr)).toFixed(1)+'%'],
  ['Cliques únicos',soma(dados.map(d=>d.cliques))]
];

document.getElementById('kpis').innerHTML =
  kpis.map(k=>`<div class="card"><span>${k[0]}</span><h2>${k[1]}</h2></div>`).join('');

/* ================= GRÁFICOS ================= */
new Chart(evolucao,{
  type:'line',
  data:{
    labels:['Jan','Fev'],
    datasets:[
      {
        label:'Envios',
        data:[1,2],
        borderColor:'#253F85',
        backgroundColor:'rgba(37,63,133,.08)',
        tension:.4,
        fill:true
      },
      {
        label:'Abertura média',
        data:[24,51],
        borderColor:'rgba(0,166,223,.5)',
        tension:.4
      }
    ]
  },
  options:{
    plugins:{legend:{display:false}},
    scales:{
      x:{grid:{display:false}},
      y:{grid:{color:'rgba(0,0,0,.04)'}}
    }
  }
});

new Chart(comparacao,{
  type:'doughnut',
  data:{
    labels:['Abertura','CTR'],
    datasets:[{
      data:[
        media(dados.map(d=>d.taxaAbertura)),
        media(dados.map(d=>d.ctr))
      ],
      backgroundColor:['#253F85','#00A6DF'],
      borderWidth:0
    }]
  },
  options:{
    cutout:'65%',
    plugins:{legend:{position:'bottom'}}
  }
});

new Chart(distribuicao,{
  type:'doughnut',
  data:{
    labels:['CTR 0','0–2%','2–5%','>5%'],
    datasets:[{
      data:[
        dados.filter(d=>d.ctr===0).length,
        dados.filter(d=>d.ctr>0&&d.ctr<=2).length,
        dados.filter(d=>d.ctr>2&&d.ctr<=5).length,
        dados.filter(d=>d.ctr>5).length
      ],
      backgroundColor:['#ccc','#253F85','#00A6DF','#F9BD00'],
      borderWidth:0
    }]
  },
  options:{
    cutout:'65%',
    plugins:{legend:{position:'bottom'}}
  }
});

/* ================= LEITURA EXECUTIVA ================= */
document.getElementById('leituraExecutiva').innerHTML = `
<p><b>Performance geral sólida</b>, com taxa média de abertura de <b>${media(dados.map(d=>d.taxaAbertura)).toFixed(1)}%</b>.</p>
<p>Campanhas de <b>Webinar</b> concentram os maiores CTRs, enquanto comunicações institucionais apresentam baixo clique.</p>
<p>Oportunidade clara de otimização em <b>CTAs</b> e testes A/B para campanhas informativas.</p>
`;

/* ================= TABELA ================= */
const tabela = document.getElementById('tabela');
tabela.innerHTML = `
<thead>
<tr>
  <th>Assunto</th>
  <th>Data</th>
  <th>Dia</th>
  <th>Campanha</th>
  <th class="num">Abertura %</th>
  <th class="num">CTR %</th>
  <th class="num">Cliques</th>
</tr>
</thead>
<tbody>
${dados.map(d=>`
<tr>
  <td title="${d.assunto}">${d.assunto}</td>
  <td>${d.data}</td>
  <td>${d.dia}</td>
  <td><span class="badge">${d.tipo}</span></td>
  <td class="num"><b>${d.taxaAbertura}</b></td>
  <td class="num"><b>${d.ctr}</b></td>
  <td class="num">${d.cliques}</td>
</tr>
`).join('')}
</tbody>`;

/* ================= NAVEGAÇÃO ================= */
function showSection(e,id){
  e.preventDefault();
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
  e.target.classList.add('active');
}
</script>

</body>
</html>
