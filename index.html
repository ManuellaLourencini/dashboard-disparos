<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Medportal | Dashboard Executivo RD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap
https://cdn.jsdelivr.net/npm/chart.jsscript>

<style>
/* =======================
   VARIÁVEIS DE TEMA
======================= */
:root{
  --primary:#1E2D5C;
  --secondary:#253F85;
  --accent:#00A6DF;
  --highlight:#F9BD00;
  --bg:#ECF0F8;
  --card:#ffffff;
  --text:#383839;
  --muted:#7B7D81;
}

[data-theme="dark"]{
  --bg:#0E1429;
  --card:#151C3A;
  --text:#E6E8F0;
  --muted:#A0A4C0;
}

/* =======================
   BASE
======================= */
*{box-sizing:border-box;font-family:'Roboto',sans-serif;}
body{margin:0;background:var(--bg);color:var(--text);transition:.3s;}

/* =======================
   SIDEBAR
======================= */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:260px;
  background:var(--primary);color:#fff;
  padding:24px;display:flex;flex-direction:column;
}
.logo{
  display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;
}
.logo img{
  max-width:180px;
  height:auto;
  display:none;
}
.logo img.active{display:block;}

.nav a{
  display:block;color:#fff;
  padding:12px 14px;border-radius:8px;
  margin-bottom:6px;transition:.3s;
  text-decoration:none;
}
.nav a:hover,.nav a.active{
  background:rgba(255,255,255,.15);
}

.theme-toggle{
  margin-top:auto;
  background:rgba(255,255,255,.15);
  border:none;border-radius:8px;
  padding:10px;color:#fff;
  cursor:pointer;font-size:14px;
}

/* =======================
   MAIN
======================= */
.main{margin-left:260px;padding:32px;}
.section{display:none;animation:fade .4s;}
.section.active{display:block;}
@keyframes fade{from{opacity:0}to{opacity:1}}
